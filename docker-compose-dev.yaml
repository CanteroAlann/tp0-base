name: tp0
services:
  server:
    container_name: server
    image: server:latest
    entrypoint: python3 /main.py
    environment:
    - PYTHONUNBUFFERED=1
    - LOGGING_LEVEL=DEBUG
    networks:
    - testing-net
  client1:
    image: client:latest
    container_name: client1
    entrypoint: /client
    networks:
    - testing-net
    environment:
    - CLI_ID=1
    - CLI_LOG_LEVEL=DEBUG
    volumes:
    - ./data/client1:/app/data
    depends_on:
    - server
  client2:
    image: client:latest
    container_name: client2
    entrypoint: /client
    networks:
    - testing-net
    environment:
    - CLI_ID=2
    - CLI_LOG_LEVEL=DEBUG
    volumes:
    - ./data/client2:/app/data
    depends_on:
    - server
  client3:
    image: client:latest
    container_name: client3
    entrypoint: /client
    networks:
    - testing-net
    environment:
    - CLI_ID=3
    - CLI_LOG_LEVEL=DEBUG
    volumes:
    - ./data/client3:/app/data
    depends_on:
    - server
  client4:
    image: client:latest
    container_name: client4
    entrypoint: /client
    networks:
    - testing-net
    environment:
    - CLI_ID=4
    - CLI_LOG_LEVEL=DEBUG
    volumes:
    - ./data/client4:/app/data
    depends_on:
    - server
  client5:
    image: client:latest
    container_name: client5
    entrypoint: /client
    networks:
    - testing-net
    environment:
    - CLI_ID=5
    - CLI_LOG_LEVEL=DEBUG
    volumes:
    - ./data/client5:/app/data
    depends_on:
    - server
networks:
  testing-net:
    ipam:
      driver: default
      config:
      - subnet: 172.25.125.0/24
